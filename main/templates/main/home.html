{% extends 'main/base.html' %}

{% block content %}
    <div class="row">
        <div class="col-md-3">
            <div class="card">
                <ul class="list-group list-group-flush">
                    <li class="list-group-item">
                        <a class="{% if not category %}text-dark{% endif %}" href="{% url 'product_list' %}">All</a>
                    </li>
                    {% for c in categories %}
                        <li class="list-group-item">
                            <a class="{% if category == c %}text-dark{%endif%}" href="{{c.get_absolute_url}}">{{c}}</a>
                        </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
        <div class="col-md-9">
            <h2>
                {% if category %}{{category}}{% else %}Products{% endif %}
            </h2>
            {% for product in products %}
                <div><a href="{{product.get_absolute_url}}">{{product}}</a></div>
            {% endfor %}
        </div>
    </div>

    {% include 'main/pagination.html' %}
{% endblock content %}
