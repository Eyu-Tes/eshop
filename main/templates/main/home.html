{% extends 'main/base.html' %}

{% block content %}
    <div class="row">
        <div class="col-md-3">
            <div class="card">
                <div class="list-group list-group-flush">
                    <a class="list-group-item list-group-item-action {% if not category %}active{% endif %}" href="{% url 'product_list' %}">All</a>
                    {% for c in categories %}
                        <a class="list-group-item list-group-item-action {% if category == c %}active{%endif%}" href="{{c.get_absolute_url}}">{{c}}</a>
                    {% endfor %}
                </div>
            </div>
        </div>
        <div class="col-md-9">
            <h2>
                {% if category %}{{category}}{% else %}Products{% endif %}
            </h2>
            {% for product in products %}
                <div><a href="{{product.get_absolute_url}}">{{product}}</a></div>
            {% endfor %}
        </div>
    </div>

    {% include 'main/pagination.html' %}
{% endblock content %}
